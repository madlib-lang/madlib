on: [push]
name: build
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install haskell
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://get-ghcup.haskell.org | sh
          ~/.ghcup/bin/ghcup install 8.10.7
          ~/.ghcup/bin/ghcup install cabal 3.4.0.0
          ~/.ghcup/bin/ghcup install stack 2.7.3
          ~/.ghcup/bin/ghcup set 8.10.7
          ~/.ghcup/bin/ghcup set cabal 3.4.0.0
          ~/.ghcup/bin/ghcup set stack 2.7.3

      - name: Configure stack
        run: stack config set system-ghc --global true

      - run: DEBIAN_FRONTEND=noninteractive sudo apt-get update -y

      - run: sudo apt-get install -y lcov cmake ninja-build nasm

      - uses: actions/cache@v4
        id: cache-llvm
        name: Cache LLVM 12 build
        with:
          path: /usr/local/llvm-12
          key: ${{ runner.os }}-llvm-12.0.1

      - name: Build LLVM 12 from source
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/llvm/llvm-project.git --branch llvmorg-12.0.1 --depth 1 /tmp/llvm-project
          cmake -S /tmp/llvm-project/llvm -B /tmp/llvm-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local/llvm-12 \
            -DLLVM_ENABLE_PROJECTS="clang;polly" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF
          ninja -C /tmp/llvm-build -j$(nproc)
          sudo ninja -C /tmp/llvm-build install

      - name: Add LLVM 12 to PATH
        run: |
          echo "/usr/local/llvm-12/bin" >> $GITHUB_PATH
          echo "LIBRARY_PATH=/usr/local/llvm-12/lib:$LIBRARY_PATH" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Cache ~/.stack
        with:
          path: ~/.stack
          key: ${{ runner.os }}-8.10.7-stack

      - name: build runtime libs
        run: TARGET="LINUX_X64" ./scripts/build-runtime-libs

      - name: build runtime
        run: AR="llvm-ar" TARGET="LINUX_X64" CPLUS_INCLUDE_PATH="/usr/local/llvm-12/include/c++/v1:/usr/include/c++/11:/usr/include/x86_64-linux-gnu/c++/11:/usr/include/" ./scripts/build-runtime

      - run: ./scripts/test coverage

      - run: ./scripts/coverage

      - run: |
          cd .github/workflows
          node update-cov.mjs

      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage/codecov.json
          # flags: unittests # optional
          # name: codecov-umbrella # optional
          # fail_ci_if_error: true # optional (default = false)
          verbose: true

      # - name: Coveralls
      #   uses: coverallsapp/github-action@master
      #   with:
      #     path-to-lcov: coverage/lcov.info
      #     github-token: ${{ secrets.GITHUB_TOKEN }}
