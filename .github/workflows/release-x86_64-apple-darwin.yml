name: 'Build osx target for release'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release ( ex: v0.0.1 )'
        required: true

env:
  node-version: 20.x

jobs:
  release:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - uses: haskell/actions/setup@v2
        with:
            ghc-version: "8.10.7"
            cabal-version: "3.4.0.0"
            stack-version: "2.7.3"
            enable-stack: true

      - name: Configure stack
        run: stack config set system-ghc --global true

      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}

      - name: Install rollup
        run: npm i -g esbuild@v0.20.0

      - name: Install build dependencies
        run: brew install cmake ninja autoconf automake nasm libtool perl

      - name: Build and install LLVM 12 from source
        run: |
          git clone https://github.com/llvm/llvm-project.git --branch llvmorg-12.0.1 --depth 1 /tmp/llvm-project
          cmake -S /tmp/llvm-project/llvm -B /tmp/llvm-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_ENABLE_BINDINGS=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF
          ninja -C /tmp/llvm-build -j$(sysctl -n hw.logicalcpu)
          sudo ninja -C /tmp/llvm-build install

      - name: Build madlib executable
        run: stack build

      - name: Add rpath
        run: install_name_tool -change /usr/local/lib/libc++.1.0.dylib /usr/lib/libc++.1.dylib "$(stack path --dist-dir)/build/madlib/madlib"

      - name: Build runtime
        run: |
          TARGET="MACOS_X64" ./scripts/build-runtime-libs
          TARGET="MACOS_X64" AR="llvm-ar" ./scripts/build-runtime

      - name: Build tools
        run: ./scripts/build

      - name: Bundle archive
        run: |
          mkdir madlib-x86_64-apple-darwin
          cp "$(stack path --dist-dir)/build/madlib/madlib" ./madlib-x86_64-apple-darwin/madlib
          cp -R runtime ./madlib-x86_64-apple-darwin/
          cp -R prelude ./madlib-x86_64-apple-darwin/
          cp ./tools/package-installer/dist/package-installer.js ./madlib-x86_64-apple-darwin/
          tar -czvf madlib-x86_64-apple-darwin.tar.gz madlib-x86_64-apple-darwin

      - name: Upload build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: ./madlib-x86_64-apple-darwin.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
